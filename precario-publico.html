<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Preçário · Studio DeVitto</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* ============================================================
           ESTILOS COMPLETOS - MODO CLARO E ELEGANTE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #26196b;
            --primary-light: #4a3a9c;
            --secondary: #D4AF37;
            --secondary-light: #f0e08a;
            --bg: #f5f2f0;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6c6c8a;
            --card-bg: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.3s ease;
            --header-bg: linear-gradient(135deg, #26196b 0%, #4a3a9c 100%);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: var(--header-bg);
            color: white;
            padding: 40px 20px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 50%;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 50%;
        }
        
        .header-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header .logo-icon {
            font-size: 48px;
            color: var(--secondary);
            margin-bottom: 10px;
            display: block;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        
        .header h1 span {
            color: var(--secondary);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.85;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header .badge-count {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            color: var(--secondary);
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 12px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        /* ===== CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: -30px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        
        /* ===== FILTROS ===== */
        .filtros {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .filtros .search-wrapper {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        
        .filtros .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .filtros .search-wrapper input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border: 2px solid #e8e6ea;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: var(--transition);
            background: #fafafc;
        }
        
        .filtros .search-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(38, 25, 107, 0.1);
        }
        
        .filtros select {
            padding: 10px 16px;
            border: 2px solid #e8e6ea;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            background: #fafafc;
            color: var(--text);
            cursor: pointer;
            min-width: 150px;
            transition: var(--transition);
        }
        
        .filtros select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* ===== CATEGORIAS ===== */
        .categoria-section {
            margin-bottom: 40px;
        }
        
        .categoria-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--secondary);
            cursor: pointer;
            user-select: none;
        }
        
        .categoria-header .cat-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .categoria-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }
        
        .categoria-header .cat-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
            background: #f0eef2;
            padding: 2px 12px;
            border-radius: 20px;
        }
        
        .categoria-header .toggle-icon {
            color: var(--text-muted);
            transition: var(--transition);
        }
        
        .categoria-header .toggle-icon.rotated {
            transform: rotate(180deg);
        }
        
        .categoria-body {
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        
        .categoria-body.collapsed {
            max-height: 0 !important;
        }
        
        /* ===== TABELA DE SERVIÇOS ===== */
        .table-wrapper {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        
        .table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        .table-wrapper thead {
            background: var(--primary);
            color: white;
        }
        
        .table-wrapper thead th {
            padding: 14px 18px;
            text-align: left;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table-wrapper tbody tr {
            border-bottom: 1px solid #f0eef2;
            transition: var(--transition);
        }
        
        .table-wrapper tbody tr:hover {
            background: #faf8fc;
        }
        
        .table-wrapper tbody tr:last-child {
            border-bottom: none;
        }
        
        .table-wrapper tbody td {
            padding: 12px 18px;
            vertical-align: middle;
        }
        
        .table-wrapper .servico-nome {
            font-weight: 500;
        }
        
        .table-wrapper .servico-preco {
            font-weight: 700;
            color: var(--primary);
            font-size: 15px;
        }
        
        .table-wrapper .servico-tempo {
            color: var(--text-muted);
            font-size: 13px;
        }
        
        .table-wrapper .servico-desc {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .table-wrapper .colaborador-tag {
            display: inline-block;
            background: #f0eef2;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-muted);
            margin: 2px 4px 2px 0;
        }
        
        /* ===== STATUS ===== */
        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.inactive {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e8e6ea;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ===== SEM RESULTADOS ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        
        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid #e8e6ea;
            margin-top: 20px;
        }
        
        .footer .social {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        
        .footer .social a {
            color: var(--text-muted);
            font-size: 20px;
            transition: var(--transition);
        }
        
        .footer .social a:hover {
            color: var(--primary);
        }
        
        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .header {
                padding: 30px 16px 50px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header p {
                font-size: 0.95rem;
            }
            
            .container {
                margin-top: -20px;
                padding: 0 12px;
            }
            
            .filtros {
                padding: 16px;
                flex-direction: column;
                align-items: stretch;
            }
            
            .filtros .search-wrapper {
                min-width: auto;
            }
            
            .filtros select {
                min-width: auto;
                width: 100%;
            }
            
            .categoria-header h2 {
                font-size: 1.1rem;
            }
            
            .table-wrapper {
                overflow-x: auto;
            }
            
            .table-wrapper table {
                font-size: 13px;
                min-width: 500px;
            }
            
            .table-wrapper thead th,
            .table-wrapper tbody td {
                padding: 10px 12px;
            }
            
            .table-wrapper .servico-preco {
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.4rem;
            }
            
            .header .logo-icon {
                font-size: 36px;
            }
            
            .categoria-header .cat-icon {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            
            .table-wrapper table {
                font-size: 12px;
                min-width: 400px;
            }
        }
        
        /* ===== ANIMAÇÃO DE ENTRADA ===== */
        .categoria-section {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .categoria-section:nth-child(2) { animation-delay: 0.05s; }
        .categoria-section:nth-child(3) { animation-delay: 0.10s; }
        .categoria-section:nth-child(4) { animation-delay: 0.15s; }
        .categoria-section:nth-child(5) { animation-delay: 0.20s; }
        .categoria-section:nth-child(6) { animation-delay: 0.25s; }
        .categoria-section:nth-child(7) { animation-delay: 0.30s; }
        .categoria-section:nth-child(8) { animation-delay: 0.35s; }
        .categoria-section:nth-child(9) { animation-delay: 0.40s; }
        .categoria-section:nth-child(10) { animation-delay: 0.45s; }
        .categoria-section:nth-child(11) { animation-delay: 0.50s; }
        .categoria-section:nth-child(12) { animation-delay: 0.55s; }
        .categoria-section:nth-child(13) { animation-delay: 0.60s; }
        .categoria-section:nth-child(14) { animation-delay: 0.65s; }
        .categoria-section:nth-child(15) { animation-delay: 0.70s; }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-content">
            <span class="logo-icon">✂️</span>
            <h1>Preçário <span>Studio DeVitto</span></h1>
            <p>Conheça nossos serviços, preços e horários. Agende sua visita!</p>
            <div class="badge-count">
                <i class="fas fa-cut me-2"></i>
                <span id="totalServicos">Carregando...</span> serviços disponíveis
            </div>
        </div>
    </header>

    <!-- ===== CONTEÚDO ===== -->
    <div class="container">
        
        <!-- Filtros -->
        <div class="filtros">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar serviço, categoria ou colaborador..." />
            </div>
            <select id="categoriaFilter">
                <option value="">Todas as categorias</option>
            </select>
            <select id="ordenacaoFilter">
                <option value="nome">Ordenar por Nome</option>
                <option value="preco">Ordenar por Preço (menor)</option>
                <option value="preco-desc">Ordenar por Preço (maior)</option>
            </select>
        </div>

        <!-- Lista de Categorias e Serviços -->
        <div id="precarioContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando serviços...</p>
            </div>
        </div>

    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="social">
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="#" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="#" title="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
        <p>&copy; 2026 Studio DeVitto · Todos os direitos reservados</p>
        <p style="font-size: 0.75rem; margin-top: 4px;">Preços sujeitos a alteração. Consulte-nos para mais informações.</p>
    </footer>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // CONFIGURAÇÃO DO FIREBASE (MESMA DO SISTEMA)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC5ezGCOS5d-Vy2l-Gimkl_V9VmwDLZzKc",
            authDomain: "studio-devitto-152400.firebaseapp.com",
            projectId: "studio-devitto-152400",
            storageBucket: "studio-devitto-152400.appspot.com",
            messagingSenderId: "138996544906",
            appId: "1:138996544906:web:6569bf954a00e2f7944473",
            measurementId: "G-FCC5T13QW8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // VARIÁVEIS
        // ============================================================
        let todosServicos = [];
        let todasCategorias = [];
        let servicosListener = null;
        let categoriasListener = null;
        let currentFilter = '';
        let currentCategoria = '';
        let currentOrdenacao = 'nome';

        // ============================================================
        // CORES DAS CATEGORIAS (PARA O ÍCONE)
        // ============================================================
        const coresCategorias = {
            'Cabelo': '#26196b',
            'Brushing': '#D4AF37',
            'Madeixas': '#8B4513',
            'Coloração': '#C71585',
            'Alisamentos': '#2E8B57',
            'Tratamentos': '#6A5ACD',
            'Mega Hair': '#FF4500',
            'Manicure': '#FF69B4',
            'Unhas em Gel': '#BA55D3',
            'Depilação Feminina': '#FF1493',
            'Depilação Masculina': '#1E90FF',
            'Procedimentos Faciais': '#FFD700',
            'Procedimentos Corporais': '#32CD32',
            'Sobrancelhas': '#8B008B',
            'Podologia': '#CD853F'
        };

        const iconesCategorias = {
            'Cabelo': 'fa-cut',
            'Brushing': 'fa-wind',
            'Madeixas': 'fa-paint-brush',
            'Coloração': 'fa-palette',
            'Alisamentos': 'fa-magic',
            'Tratamentos': 'fa-hand-holding-heart',
            'Mega Hair': 'fa-user-plus',
            'Manicure': 'fa-hand-sparkles',
            'Unhas em Gel': 'fa-paint-roller',
            'Depilação Feminina': 'fa-female',
            'Depilação Masculina': 'fa-male',
            'Procedimentos Faciais': 'fa-face-smile',
            'Procedimentos Corporais': 'fa-people-arrows',
            'Sobrancelhas': 'fa-eye',
            'Podologia': 'fa-foot'
        };

        // ============================================================
        // CARREGAR DADOS DO FIREBASE (PÚBLICO - SEM AUTENTICAÇÃO)
        // ============================================================
        function carregarDados() {
            const container = document.getElementById('precarioContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando serviços...</p>
                </div>
            `;

            // Carregar categorias
            db.collection('categorias')
                .get()
                .then(snapshot => {
                    todasCategorias = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        // Verificar se a categoria tem userId ou se é pública
                        if (data.nome) {
                            todasCategorias.push({
                                id: doc.id,
                                ...data
                            });
                        }
                    });
                    console.log('📋 Categorias carregadas:', todasCategorias.length);
                    atualizarFiltroCategorias();
                })
                .catch(error => {
                    console.error('Erro ao carregar categorias:', error);
                });

            // Carregar serviços
            db.collection('servicos')
                .get()
                .then(snapshot => {
                    todosServicos = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        // Filtrar apenas serviços ativos ou que não tenham campo ativo
                        if (data.ativo !== false) {
                            todosServicos.push({
                                id: doc.id,
                                ...data
                            });
                        }
                    });
                    console.log('📋 Serviços carregados:', todosServicos.length);
                    document.getElementById('totalServicos').textContent = todosServicos.length;
                    renderizarPrecario();
                })
                .catch(error => {
                    console.error('Erro ao carregar serviços:', error);
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Erro ao carregar serviços: ${error.message}</p>
                            <button onclick="carregarDados()" style="margin-top:12px; padding:8px 24px; background:var(--primary); color:white; border:none; border-radius:30px; cursor:pointer;">
                                <i class="fas fa-sync-alt me-2"></i>Tentar novamente
                            </button>
                        </div>
                    `;
                });
        }

        // ============================================================
        // ATUALIZAR FILTRO DE CATEGORIAS
        // ============================================================
        function atualizarFiltroCategorias() {
            const select = document.getElementById('categoriaFilter');
            select.innerHTML = '<option value="">Todas as categorias</option>';
            todasCategorias.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`;
            });
        }

        // ============================================================
        // RENDERIZAR PREÇÁRIO
        // ============================================================
        function renderizarPrecario() {
            const container = document.getElementById('precarioContainer');
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const categoriaId = document.getElementById('categoriaFilter').value;
            const ordenacao = document.getElementById('ordenacaoFilter').value;

            // Filtrar serviços
            let filtrados = todosServicos.filter(servico => {
                // Busca
                if (search) {
                    const nomeMatch = (servico.nome || '').toLowerCase().includes(search);
                    const catMatch = (servico.categoriaNome || '').toLowerCase().includes(search);
                    const descMatch = (servico.descricao || '').toLowerCase().includes(search);
                    const colMatch = (servico.colaboradoresIds || []).some(id => {
                        // Buscar nome do colaborador (usando a lista global de colaboradores)
                        return false; // Simplificado para público
                    });
                    if (!(nomeMatch || catMatch || descMatch || colMatch)) return false;
                }

                // Categoria
                if (categoriaId) {
                    if (servico.categoriaId !== categoriaId) return false;
                }

                return true;
            });

            // Ordenar
            if (ordenacao === 'nome') {
                filtrados.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
            } else if (ordenacao === 'preco') {
                filtrados.sort((a, b) => (a.preco || 0) - (b.preco || 0));
            } else if (ordenacao === 'preco-desc') {
                filtrados.sort((a, b) => (b.preco || 0) - (a.preco || 0));
            }

            // Agrupar por categoria
            const grupos = {};
            filtrados.forEach(servico => {
                const key = servico.categoriaId || 'outros';
                if (!grupos[key]) {
                    const categoria = todasCategorias.find(c => c.id === key);
                    grupos[key] = {
                        id: key,
                        nome: categoria ? categoria.nome : (servico.categoriaNome || 'Outros'),
                        cor: categoria ? (categoria.cor || coresCategorias[categoria.nome] || '#26196b') : '#26196b',
                        servicos: []
                    };
                }
                grupos[key].servicos.push(servico);
            });

            // Ordenar grupos por nome
            const gruposOrdenados = Object.values(grupos).sort((a, b) => a.nome.localeCompare(b.nome));

            if (gruposOrdenados.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>Nenhum serviço encontrado</h3>
                        <p>Tente ajustar os filtros ou buscar por outro termo.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            gruposOrdenados.forEach(grupo => {
                const cor = grupo.cor || '#26196b';
                const icon = iconesCategorias[grupo.nome] || 'fa-tag';

                html += `
                    <div class="categoria-section">
                        <div class="categoria-header" onclick="toggleCategoria(this)">
                            <div class="cat-icon" style="background: ${cor};">
                                <i class="fas ${icon}"></i>
                            </div>
                            <h2>${grupo.nome}</h2>
                            <span class="cat-count">${grupo.servicos.length} serviços</span>
                            <i class="fas fa-chevron-down toggle-icon"></i>
                        </div>
                        <div class="categoria-body">
                            <div class="table-wrapper">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Serviço</th>
                                            <th>Descrição</th>
                                            <th>Tempo</th>
                                            <th style="text-align:right;">Preço</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${grupo.servicos.map(servico => `
                                            <tr>
                                                <td class="servico-nome">${servico.nome || 'Sem nome'}</td>
                                                <td class="servico-desc">${servico.descricao || '-'}</td>
                                                <td class="servico-tempo">${servico.tempo ? servico.tempo + ' min' : '-'}</td>
                                                <td class="servico-preco" style="text-align:right;">
                                                    ${servico.preco ? '€ ' + servico.preco.toFixed(2).replace('.', ',') : 'Consultar'}
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Expandir a primeira categoria por padrão
            const firstBody = container.querySelector('.categoria-body');
            if (firstBody) {
                firstBody.style.maxHeight = firstBody.scrollHeight + 'px';
            }
        }

        // ============================================================
        // TOGGLE CATEGORIA (EXPANDIR/RECOLHER)
        // ============================================================
        function toggleCategoria(header) {
            const body = header.nextElementSibling;
            const icon = header.querySelector('.toggle-icon');
            
            if (!body) return;
            
            if (body.style.maxHeight && body.style.maxHeight !== '0px') {
                body.style.maxHeight = '0px';
                if (icon) icon.classList.add('rotated');
            } else {
                body.style.maxHeight = body.scrollHeight + 'px';
                if (icon) icon.classList.remove('rotated');
            }
        }

        // ============================================================
        // EVENTOS DOS FILTROS
        // ============================================================
        document.getElementById('searchInput').addEventListener('input', renderizarPrecario);
        document.getElementById('categoriaFilter').addEventListener('change', renderizarPrecario);
        document.getElementById('ordenacaoFilter').addEventListener('change', renderizarPrecario);

        // ============================================================
        // INICIALIZAR
        // ============================================================
        carregarDados();

        console.log('✅ Página pública do Preçário carregada!');
        console.log('📌 Link para compartilhar: ' + window.location.href);
    </script>
</body>
</html>
